source = ~/.cache/wal/colors-hyprlock.conf

general {
    grace       = 0
    hide_cursor = true
    no_fade_in  = false
}

background {
    monitor     =
    path        = $wallpaper
    blur_passes = 2
    blur_size   = 8
    brightness  = 0.5
    contrast    = 1.1
    vibrancy    = 0.17
}

label {
    monitor     =
    text        = cmd[update:10000] echo "$(date +'%H:%M')"
    position    = 0, 140
    halign      = center
    valign      = center
    color       = $foreground
    font_family = JetBrainsMono Nerd Font
    font_size   = 96
    font_weight = 200
}

label {
    monitor     =
    text        = cmd[update:60000] echo "$(date +'%A, %-d %B' | tr '[:lower:]' '[:upper:]')"
    position    = 0, 44
    halign      = center
    valign      = center
    color       = $foreground
    font_family = JetBrainsMono Nerd Font
    font_size   = 11
    font_weight = 500
    opacity     = 0.6
}

shape {
    monitor      =
    size         = 300, 56
    position     = 0, -90
    halign       = center
    valign       = center
    color        = rgba(0, 0, 0, 0.25)
    rounding     = 15
    border_size  = 1
    border_color = $accent2
}

input-field {
    monitor           =
    size              = 300, 56
    position          = 0, -90
    halign            = center
    valign            = center
    outline_thickness = 2
    rounding          = 15
    outer_color       = $accent
    inner_color       = rgba(0, 0, 0, 0)
    font_color        = $foreground
    check_color       = $accent
    fail_color        = $warn
    capslock_color    = $warn
    font_family       = JetBrainsMono Nerd Font
    font_size         = 14
    placeholder_text  = 󰌾  enter password
    hide_input        = false
    dots_size         = 0.25
    dots_spacing      = 0.3
    dots_center       = true
    fade_on_empty     = true
    fade_timeout      = 1500
}

label {
    monitor     =
    text        = $FAIL
    position    = 0, -155
    halign      = center
    valign      = center
    color       = $warn
    font_family = JetBrainsMono Nerd Font
    font_size   = 11
    opacity     = 0.8
}